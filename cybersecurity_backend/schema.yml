components:
  schemas:
    AccessLevelEnum:
      enum:
      - low
      - medium
      - high
      - critical
      type: string
      description: |-
        * `low` - Low
        * `medium` - Medium
        * `high` - High
        * `critical` - Critical
    AccessRequest:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
        approved_by_username:
          type: string
          readOnly: true
        resource:
          type: string
          maxLength: 255
        access_level:
          type: string
          maxLength: 50
        justification:
          type: string
        status:
          $ref: '#/components/schemas/StatusA1dEnum'
        approved_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        user:
          type: integer
        approved_by:
          type: integer
          readOnly: true
          nullable: true
      required:
      - access_level
      - approved_at
      - approved_by
      - approved_by_username
      - created_at
      - id
      - resource
      - user
      - username
    AccessRequestRequest:
      type: object
      properties:
        resource:
          type: string
          minLength: 1
          maxLength: 255
        access_level:
          type: string
          minLength: 1
          maxLength: 50
        justification:
          type: string
        status:
          $ref: '#/components/schemas/StatusA1dEnum'
        expires_at:
          type: string
          format: date-time
          nullable: true
        user:
          type: integer
      required:
      - access_level
      - resource
      - user
    ActionEnum:
      enum:
      - create
      - read
      - update
      - delete
      - login
      - logout
      - access
      - export
      - import
      - custom
      type: string
      description: |-
        * `create` - Create
        * `read` - Read
        * `update` - Update
        * `delete` - Delete
        * `login` - Login
        * `logout` - Logout
        * `access` - Access
        * `export` - Export
        * `import` - Import
        * `custom` - Custom
    AgentTypeEnum:
      enum:
      - monitoring
      - remediation
      - investigation
      - threat_hunting
      type: string
      description: |-
        * `monitoring` - Monitoring
        * `remediation` - Remediation
        * `investigation` - Investigation
